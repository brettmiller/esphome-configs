## Princeton protocol timing: pulse_length 350µs is typical for SC2262.
## sync [1,31] = 1 high + 31 low pulse lengths (≈350µs + 10850µs gap)
## zero [1,3]  = 1 high + 3 low pulse lengths
## one  [3,1]  = 3 high + 1 low pulse lengths
##
## Binary strings are the 24-bit representation of each hex code,
## which is exactly what on_princeton will decode on receive.
##   0xA1B2C3 = 101000011011001011000011
##   0xD4E5F6 = 110101001110010111110110
##   0x789ABC = 011110001001101010111100
