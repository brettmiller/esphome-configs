substitutions:
  device_name: sb-plug-mini
  name: sb-plug-mini
  description: esphome esp32-c3 switchbot plug mini (basic esp32-c3 just the boad with improv)

packages:
  #!<<: !include_dir_named common
  board: !include boards/esp32-c3-devkitm-1.yaml
  #web_server: !include components/web_server.yaml

esphome:
  name: ${device_name}
  friendly_name: ${name}
  comment: ${description}
  build_path: .build/${device_name}
  name_add_mac_suffix: true

# Enable logging
logger:
#  baud_rate: 0 #disable UART logging

#http_request:

ota:
  -  platform: esphome
     id: component_ota
  #- platform: http_request
  #  id: ota_http_request
  - platform: web_server
    id: ota_web_server

wifi:
  on_connect:
    - delay: 5s  # Gives time for improv results to be transmitted
    - ble.disable:
    #- script.execute: control_leds
  #ap:                          # maybe not needed with improv, since it will restart improv after 1min if wifi is no longer connected
  #  ssid: "${device_name}_ap"  # seems to cause issues with improv if enabled
  #  password: "esphomepass"
  #  ap_timeout: 2min

#improv_serial:  # don't need this

esp32_ble:
  name: sb-plug-mini

esp32_improv:
  authorizer: power_button
  status_indicator: white_output

api:

web_server:
  id: component_web_server
  auth:
    username: esphome
    password: esphomepass

binary_sensor:
  # Detects that a button on the Plug Mini unit has been pressed
  - platform: gpio
    id: power_button
    pin:
      number: GPIO02
      inverted: true
    #internal: true

output:
  # White LED output
  - platform: ledc
    id: white_output
    pin: GPIO07
    inverted: true
    frequency: 19531Hz

light:
  # White LED light
  - platform: monochromatic
    output: white_output
    name: White LED
    id: white_led
    icon: mdi:led-off
    entity_category: config
    default_transition_length: 250ms
    restore_mode: RESTORE_DEFAULT_OFF # White LED light state at startup of Plug Mini

