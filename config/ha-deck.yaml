packages:
  <<: !include_dir_named common
  board: !include boards/wt32-sc01-plus.yaml

external_components:
  - source:
      type: git
      url: https://github.com/strange-v/ha_deck
      ref: main
    components: [ hd_device_sc01_plus, ha_deck ]

