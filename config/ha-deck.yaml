switch:
  - platform: homeassistant
    name: "Dining Room Light"
    id: dining_room_light
    entity_id: switch.dining_room_light_top

hd_device_sc01_plus:
  id: device
  brightness: 75

ha_deck:
  id: deck
  main_screen: ${SCREEN_MAIN}
  inactivity:
    period: 60 # seconds
    blank_screen: true
  on_inactivity_change:
    lambda:  |-
      if (x) {
        id(device).set_brightness(id(inactive_screen_brightness).state);
      } else {
        id(device).set_brightness(id(screen_brightness).state);
      }
  screens:
    - name: ${SCREEN_MAIN}
      widgets:
        - type: value-card
          #id: local_time
          id: time_sensor
          position: 8, 8
          dimensions: 228x96
          text: "Time"
          enabled: return true;
          value: |- # I added this so it doesn't need the time: cron lamda and uses homeassistant_time from common/time.yaml and 12hr format
            return id(homeassistant_time).now().strftime("%l:%M:%S %p");
          on_click:
            - logger.log: "Time clicked"
        - type: button
          position: 8, 112
          text: "Favorite"
          icon: 󰋑
          visible: |-
            return true;
        - type: value-card
          id: outside_temperature
          position: 126, 112
          text: Outside
          icon: 󰔏
          unit: °F
          enabled: return true;
          value: |-
            char buff[10] = "-";
            sprintf(buff, "%.1f", id(outside_temperature_sensor).state);
            return std::string(buff);
        - type: button
          position: 362, 8
          text: Rooms
          icon: 󰠡
          enabled: return true;
          on_click:
            lambda: |-
                id(deck).switch_screen("$SCREEN_ROOMS");
          on_long_press:
            - logger.log: "Rooms long pressed"
        - type: button
          position: 8, 216
          text: Dining
          icon: 󰝩
          toggle: true
          enabled: return true;
          checked: |-
            return id(dining_room_light).state; // this works if a switch is defined w/ the id: dining_room_light
          #  return id(dining_room_light_state).state; // this also works if a binary_sensor is defined w/ the id: dining_room_light_state
          on_turn_on:
            - switch.turn_on:
                id: dining_room_light
          on_turn_off:
            - switch.turn_off:
                id: dining_room_light
          ## The above works (w/ a switch:...platform: homeassistant) and so does the below using homeassistant.service 
          #on_turn_on:
          #  homeassistant.service:
          #    service: switch.turn_on
          #    data:
          #      entity_id: switch.dining_room_light_top 
          #on_turn_off:
          #  homeassistant.service:
          #    service: switch.turn_off
          #    data:
          #      entity_id: switch.dining_room_light_top
        - type: button
          position: 126, 216
          text: Brightness
          icon: 󰖨
          enabled: return true;
          on_click:
            lambda: id(deck).switch_screen("$SCREEN_LED");
    - name: ${SCREEN_ROOMS}
      widgets:
        - type: button
          position: 8, 8
          icon: 󰁍
          enabled: |-
            return true;
          on_click:
            then:
            - lambda: |-
                id(deck).switch_screen("$SCREEN_MAIN");
        - type: button
