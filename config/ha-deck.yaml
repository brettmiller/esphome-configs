sensor:
  - platform: homeassistant
    name: "Outside Temperature"
    id: outside_temperature_sensor
    entity_id: sensor.carport_temperature
    unit_of_measurement: "°F"
    accuracy_decimals: 1

binary_sensor:
  - platform: homeassistant
    name: "Dining Room Light State"
    id: dining_room_light_state
    entity_id: switch.dining_room_light_top

number:
  - platform: template
    id: screen_brightness
    name: Active screen brightness
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 75
    restore_value: true
    set_action:
      - lambda: |-
          if (!id(deck).get_inactivity())
            id(device).set_brightness(x);
  - platform: template
    id: inactive_screen_brightness
    name: Inactive screen brightness
    min_value: 0
    max_value: 100
    step: 5
    initial_value: 20
    restore_value: true
    set_action:
      - lambda: |-
          if (id(deck).get_inactivity())
            id(device).set_brightness(x);
